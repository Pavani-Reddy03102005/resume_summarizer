{% extends 'resume/base.html' %}

{% block content %}

<h2>Dashboard</h2>

<h4>Welcome, {{ request.user.username }} 👋</h4>

<div class="row mt-4">

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Total</h5>
            <h2>{{ stats.total }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Completed</h5>
            <h2>{{ stats.completed }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Pending</h5>
            <h2>{{ stats.pending }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h5>Failed</h5>
            <h2>{{ stats.failed }}</h2>
        </div>
    </div>

</div>

{% endblock %}
