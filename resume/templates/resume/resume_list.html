{% extends 'resume/base.html' %}

{% block content %}

<h2>Resume List</h2>

{% if page_obj %}

<table class="table table-dark mt-4">
    <thead>
        <tr>
            <th>File</th>
            <th>Status</th>
            <th>Score</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for r in page_obj %}
        <tr>
            <td>{{ r.original_filename }}</td>
            <td>{{ r.status }}</td>
            <td>{{ r.job_match_score }}</td>
            <td>
                <a href="{% url 'resume_detail' r.id %}" class="btn btn-info btn-sm">View</a>

                <a href="{% url 'delete_resume' r.id %}"
                   onclick="return confirm('Are you sure?')"
                   class="btn btn-danger btn-sm">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% else %}
<p>No resumes uploaded yet.</p>
{% endif %}

{% endblock %}
