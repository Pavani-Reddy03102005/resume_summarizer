{% extends 'resume/base.html' %}

{% block content %}

<h2>Upload Resume</h2>

<form method="POST" enctype="multipart/form-data" class="mt-4">
    {% csrf_token %}

    <input type="file" name="resumes" class="form-control mb-3">

    <button class="btn btn-success">Upload</button>
</form>

{% endblock %}
